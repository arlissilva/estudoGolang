<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Estado</h1>
    <table>
        
        <tr>
            <th>Nome</th>
            <th>Sigla</th>
        </tr>
        {{ range . }}
        <tr>
            <td>{{ .Name}}</td>
            <td>{{ .Uf}}</td>
        </tr>
        {{ end }}
    </table>
    <h2>Estados se for RJ</h2>
    <table>
        <tr>
            <th>Nome</th>
            <th>Sigla</th>
        </tr>
        {{ range . }}
            {{ if eq .Uf "RJ" }}
            <tr>
                <td>{{ .Name }}</td>
                <td>{{ .Uf }}</td>
            </tr>
            {{ end }}
        {{ end }}
    </table>
</body>
</html>
